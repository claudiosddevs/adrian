<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Técnico — Full Internet Services</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <button class="topbar__hamburger btn" id="hamburger">☰</button>
      <div>
        <div class="topbar__title" id="tecTitle">Panel Técnico</div>
        <div class="topbar__meta" id="tecDate"></div>
      </div>
    </header>
    <main class="page" id="pageContent">
      <div class="loading-state"><div class="spinner"></div></div>
    </main>
  </div>
</div>

<!-- UPDATE STATUS MODAL -->
<div class="modal-overlay" id="updateModal">
  <div class="modal">
    <div class="modal__header">
      <div class="modal__title" id="updateTitle">Actualizar Reclamo</div>
      <button class="modal__close" onclick="document.getElementById('updateModal').classList.remove('open')">✕</button>
    </div>
    <div id="updateContent"></div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/sidebar.js"></script>
<script>
Auth.requireRole('Tecnico');
const user = Auth.currentUser();
document.getElementById('tecTitle').textContent = `${user.nombre.split(' ')[0]} — Técnico`;
document.getElementById('tecDate').textContent = new Date().toLocaleDateString('es-BO',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
renderSidebar('home');

async function loadTecnico() {
  const reclamos = await API.getAllReclamos();
  const misReclamos = reclamos.filter(r => r.tecnicoId === user.id);
  const activos    = misReclamos.filter(r => r.estado !== 'Resuelto');
  const resueltos  = misReclamos.filter(r => r.estado === 'Resuelto');
  const pct = misReclamos.length ? Math.round(resueltos.length/misReclamos.length*100) : 0;
  const calificaciones = resueltos.filter(r=>r.calificacion).map(r=>r.calificacion);
  const avgCal = calificaciones.length ? (calificaciones.reduce((s,c)=>s+c,0)/calificaciones.length).toFixed(1) : '—';

  document.getElementById('pageContent').innerHTML = `
    <div class="fade-in">
      <div class="page-header">
        <h2>Mis Reclamos Asignados</h2>
        <p>Bienvenido, ${user.nombre}. Aquí están tus reclamos activos y tu historial.</p>
      </div>

      <div class="grid-4 mb-3">
        <div class="stat-card stat-card--cyan">
          <div class="stat-card__label">Asignados a mí</div>
          <div class="stat-card__value">${misReclamos.length}</div>
          <div class="stat-card__icon">🎧</div>
        </div>
        <div class="stat-card stat-card--yellow">
          <div class="stat-card__label">Activos</div>
          <div class="stat-card__value">${activos.length}</div>
          <div class="stat-card__icon">🔧</div>
        </div>
        <div class="stat-card stat-card--green">
          <div class="stat-card__label">Resueltos</div>
          <div class="stat-card__value">${resueltos.length}</div>
          <div class="stat-card__icon">✅</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Calificación promedio</div>
          <div class="stat-card__value">${avgCal !== '—' ? `${avgCal} ⭐` : '—'}</div>
          <div class="stat-card__icon">⭐</div>
        </div>
      </div>

      ${activos.length >= 5 ? `<div class="alert alert--warning mb-2"><span>⚠️</span> Tienes ${activos.length} reclamos activos. Límite máximo: 5.</div>` : ''}

      <!-- Active reclamos -->
      <div class="section">
        <div class="section-header">
          <span class="section-title">🔧 Reclamos Activos (${activos.length}/5)</span>
        </div>
        ${activos.length === 0 ? `
          <div class="empty-state" style="padding:2rem"><div class="empty-state__icon">🎉</div><h3>¡Sin reclamos activos!</h3><p>Todos tus reclamos están resueltos.</p></div>
        ` : activos.map(r => `
        <div class="card mb-2">
          <div style="display:flex;align-items:flex-start;gap:1rem;flex-wrap:wrap">
            <div style="flex:1;min-width:180px">
              <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;margin-bottom:0.5rem">
                <span class="mono" style="font-size:0.75rem;color:var(--text-muted)">#${String(r.id).padStart(4,'0')}</span>
                ${tipoBadge(r.tipo)}
                ${estadoBadge(r.estado)}
              </div>
              <div style="font-weight:700;color:var(--white);font-size:0.95rem;margin-bottom:0.3rem">${r.titulo}</div>
              <div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:0.5rem">${r.cliente?.nombre} · ${formatDate(r.fecha)}</div>
              <div style="font-size:0.85rem;color:var(--text-muted)">${r.descripcion}</div>
              ${r.observacion ? `<div class="alert alert--info mt-2" style="margin-bottom:0;padding:0.6rem 0.8rem;font-size:0.82rem"><span>📝</span> ${r.observacion}</div>` : ''}
            </div>
            <div style="display:flex;flex-direction:column;gap:0.5rem">
              <button class="btn btn--primary btn--sm" onclick="openUpdate(${r.id})">Actualizar</button>
            </div>
          </div>
        </div>`).join('')}
      </div>

      <!-- Resolved history -->
      <div class="section">
        <div class="section-header">
          <span class="section-title">✅ Historial Resueltos (${resueltos.length})</span>
        </div>
        ${resueltos.length === 0 ? '<p style="color:var(--text-muted);font-size:0.88rem">Sin reclamos resueltos aún.</p>' : `
        <div class="table-wrap">
          <table class="table">
            <thead><tr><th>#</th><th>Título</th><th>Cliente</th><th>Tipo</th><th>Calificación</th><th>Fecha</th></tr></thead>
            <tbody>
              ${resueltos.map(r => `<tr>
                <td class="mono" style="font-size:0.75rem;color:var(--text-muted)">#${String(r.id).padStart(4,'0')}</td>
                <td style="font-size:0.85rem">${r.titulo}</td>
                <td style="font-size:0.85rem">${r.cliente?.nombre}</td>
                <td>${tipoBadge(r.tipo)}</td>
                <td>${r.calificacion ? '⭐'.repeat(r.calificacion) : '<span style="color:var(--text-muted)">Sin calificar</span>'}</td>
                <td style="color:var(--text-muted);font-size:0.8rem">${formatDate(r.fecha)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`}
      </div>
    </div>
  `;
  window._allReclamos = reclamos;
}

function openUpdate(id) {
  const r = window._allReclamos.find(x => x.id === id);
  document.getElementById('updateTitle').textContent = `#${String(r.id).padStart(4,'0')} — ${r.titulo}`;
  document.getElementById('updateContent').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:1rem">
      <div style="background:var(--navy-3);border-radius:var(--radius-sm);padding:1rem;font-size:0.85rem">
        <div><span style="color:var(--text-muted)">Cliente:</span> <strong style="color:var(--white)">${r.cliente?.nombre}</strong></div>
        <div style="margin-top:0.3rem"><span style="color:var(--text-muted)">Descripción:</span> <span style="color:var(--white)">${r.descripcion}</span></div>
      </div>
      <div class="form-group">
        <label class="form-label">Nuevo Estado</label>
        <select class="form-select" id="nuevoEstado">
          <option value="Recibido" ${r.estado==='Recibido'?'selected':''}>📥 Recibido</option>
          <option value="En Proceso" ${r.estado==='En Proceso'?'selected':''}>🔧 En Proceso</option>
          <option value="Resuelto" ${r.estado==='Resuelto'?'selected':''}>✅ Resuelto</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Observación / Solución aplicada</label>
        <textarea class="form-textarea" id="nuevaObs" placeholder="Describe qué hiciste para resolver el problema...">${r.observacion||''}</textarea>
      </div>
      <div class="flex gap-2">
        <button class="btn btn--ghost btn--full" onclick="document.getElementById('updateModal').classList.remove('open')">Cancelar</button>
        <button class="btn btn--primary btn--full" id="saveUpdateBtn" onclick="saveUpdate(${r.id})">Guardar Cambios</button>
      </div>
    </div>
  `;
  document.getElementById('updateModal').classList.add('open');
}

async function saveUpdate(id) {
  const estado = document.getElementById('nuevoEstado').value;
  const obs    = document.getElementById('nuevaObs').value.trim();
  const btn    = document.getElementById('saveUpdateBtn');
  setLoading(btn, true);
  try {
    await API.updateReclamoEstado(id, estado, obs);
    document.getElementById('updateModal').classList.remove('open');
    showToast(`Reclamo actualizado: ${estado}`);
    loadTecnico();
  } catch(e) { showToast(e.message, 'error'); setLoading(btn, false); }
}

loadTecnico();
</script>
</body>
</html>
